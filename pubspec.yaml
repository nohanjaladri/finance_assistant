name: finance_assistant
description: "Dompetku AI - Asisten Keuangan Cerdas dengan AI Agent"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # === STATE MANAGEMENT ===
  provider: ^6.1.5+1

  # === DATABASE & BACKEND ===
  supabase_flutter: ^2.9.1       # Primary DB + Auth + Realtime
  sqflite: ^2.3.0                # Local cache untuk offline-first
  path: ^1.8.3

  # === AI SERVICES ===
  dio: ^5.9.2                    # HTTP client untuk Groq API (primary AI)
  google_generative_ai: ^0.4.6   # Gemini API (fallback AI layer 1)

  # === VOICE ===
  speech_to_text: ^7.3.0        # STT - Input suara
  flutter_tts: ^4.2.5           # TTS - Output suara
  vibration: ^3.1.8             # Haptic feedback

  # === UI & CHARTS ===
  fl_chart: ^1.1.1               # Grafik keuangan
  intl: ^0.18.1                  # Format tanggal & angka (Rupiah)
  google_fonts: ^6.2.1

  # === UTILITIES ===
  flutter_dotenv: ^5.0.2         # Env variables (.env file)
  shared_preferences: ^2.5.4     # Local key-value storage
  permission_handler: ^11.3.1    # Runtime permissions

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/dompet.png"
# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
